[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/api-cn"
  to = "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

[[redirects]]
  from = "/api-global"
  to = "https://dashscope-us.aliyuncs.com/api/v1/services/aigc/text-generation/generation"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

[[redirects]]
  from = "/api-multi-cn"
  to = "https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

[[redirects]]
  from = "/api-multi-global"
  to = "https://dashscope-us.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
  status = 200
  force = true
  headers = {Access-Control-Allow-Origin = "*"}

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
